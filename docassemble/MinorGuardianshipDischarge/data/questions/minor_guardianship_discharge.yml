metadata:
  title: End guardianship of a child
  short title: End guardianship of a child
  comment: This program helps you ask the court to end the guardianship of a child.
  authors:
    - Vivian McNaughton
---
include:
  - docassemble.AssemblyLine:assembly_line.yml
  - docassemble.ILAO:ilao-interview-framework.yml
  - docassemble.ILAO:shared-basic-questions.yml
---
objects:
