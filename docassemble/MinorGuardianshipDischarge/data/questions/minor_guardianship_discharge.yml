code: |
  reconsider('snapshot_interview_state')
  snapshot_forms = True
---
id: welcome
question: |
  End guardianship of a child
subquestion: |
  Welcome to Illinois Legal Aid Online's **End guardianship of a child** Easy Form.

  This program helps you make a *${form_name}*. Use it if you want a court to end the guardianship of your child and give you custody again.
  
  **Note:** This Easy Form makes forms for just one child. If you want to end the guardianship of more than one child, you will have to make a separate set of forms for each child.
 
  To learn more, read ILAO's article about [**ending a guardianship**](https://www.illinoislegalaid.org/node/30466).
field: sees_nav_bar
---
id: instructions
continue button field: how_to_use
question: |
  Instructions
subquestion: |
  To fill out the forms, you will need to know:

  * Name, birthdate, and address of the child,
  * Name and address of the child's current guardian,
  * Why and when the guardianship started, 
  * What changed so that the guardianship is no longer needed, and
  * Names and addresses of the child's nearest relatives and anyone who has had custody of the child.

  Set aside 10 to 20 minutes to finish this program. You can log in and save your work to continue later. 
 
  ${ collapse_template(help_example) }  

  Click on **{green words}** to learn what they mean. Some questions have a question mark in a circle ${ fa_icon("question-circle", color_css="#0dcaf0" ) } that also gives help.
---
template: help_example
subject: |
  **You can click sections like this to show more information.**
content: |  
  This is an example of help. Click again to hide.
---
id: basic guardianship info
continue button field: basic_info
question: |
  About ending a guardianship
subquestion: |
  Your child's guardian is the person a judge has appointed to care for and make decisions for your child. A long-term, permanent guardian is called a plenary guardian. A plenary guardianship can only end by court order or once the child turns 18. 

  You can use this program if your child has a court-appointed plenary guardian and you are a legal parent of your child. If your child has a short-term guardian or a standby guardian, you do not need to use this program.

  You will need to explain to the court why ending the guardianship is in your child's best interests.
---
id: whats next
continue button field: whats_next
question: |
  After you finish this program
subquestion: |
  Once you download your forms, you must file them with the court. This program **does not file** your forms for you. When you file your forms, you will get a date for a court hearing where a judge will review your case.

  After you file the *${ form_name }* and get a court date, you will need to give notice to the child's guardian and **{close relatives}**. This ensures that everyone involved is aware of the case and has a chance to respond or appear in court.

  Finally, you will need to attend a court hearing where a judge will consider the reasons why ending the guardianship is in the child's best interest.
  
  **Note:** Filing forms, scheduling court dates, and giving notice are done differently depending on where you live. You may need to ask your local Circuit Clerk for details. To learn more, read the instructions you can download at the end of this program.
terms:
  - close relatives: |
      This includes:
      
      * The child's parents,
      * The child's adult siblings.
      * The child's spouse,
      * Any adult who lives with and takes care of the child,
      * Anyone who has had custody of the child, and
      * The child's "Guardian ad Litem," if one is assigned.
