  Why was a guardianship of ${child.name_full()} set up?
subquestion: |
  Explain why ${other_parties[0].name_full()} was appointed as ${child.name_full()}'s guardian. For example, there may have been a period of time when you were not available to provide care.
fields:
  - "The petition will include a sentence that starts,[NEWLINE]**When the guardian was appointed, the circumstances were...**": why_started
    input type: area
    rows: 8
    maxlength: 500
    label above field: True
---
id: why end
question: |
  What has changed so that ${other_parties[0].name_full()} no longer needs to be ${child.name_full()}'s guardian?
subquestion: |
  Explain why ${other_parties[0].name_full()} does not need to be ${child.name_full()}'s guardian. For example, you or another family member may now be available to care for ${child.name_full()}.
fields:
  - "The petition will include a sentence that starts,[NEWLINE]**The new circumstances are...**": why_end
    rows: 8
    input type: area
    maxlength: 500
    label above field: True
