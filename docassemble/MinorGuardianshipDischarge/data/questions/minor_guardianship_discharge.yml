id: court not illinois kickout
event: court_not_il_kickout
question: |
  Sorry
subquestion: |
  Based on your answers, this guardianship was not ordered by an Illinois court. This program cannot be used to end a guardianship that began outside Illinois.

  If you want to end a guardianship outside Illinois, you can use the [**Legal Services Corporation website**](https://www.lsc.gov/about-lsc/what-legal-aid/get-legal-help) to find a legal aid organization in another state.
buttons:
  - Exit: exit
  - Restart: restart
