---
id: welcome
question: |
  Discharge guardianship of a child
subquestion: |
  Welcome to Illinois Legal Aid Online's **Discharge guardianship of a child** Easy Form.

  This program helps you make a *Petition to discharge guardianship of a child*. Use it if you want a court to end the guardianship of your child and give you custody again.
  
  **Note:** If you want to discharge the guardianship of more than one child, you will have to make a separate set of forms for each child.
 
  To learn more, read ILAO's article about [**ending a guardianship**](https://www.illinoislegalaid.org/node/30466).
field: sees_nav_bar
---
id: instructions
continue button field: how_to_use
question: |
  Instructions
subquestion: |
  To fill out the forms, you will need to know:

  * Name, birthdate, and address of the child,
  * Name and address of the child's current guardian,
  * Why and when the guardianship started, 
  * What changed so that the guardianship is no longer needed,
  * Names and addresses of the child's nearest relatives and anyone who has had custody of the child, and
  * Your name, address, and living situation.

  Set aside 10 to 20 minutes to finish this program. You can log in and save your work to continue later. 
 
  ${ collapse_template(help_example) }  

  Click on **{green words}** to learn what they mean. Some questions have a question mark in a circle ${ fa_icon("question-circle", color_css="#0dcaf0" ) } that also gives help.
---
template: help_example
subject: |
  **You can click sections like this to show more information.**
content: |  
  This is an example of help. Click again to hide.
---
id: basic guardianship info
continue button field: basic_info
question: |
  About guardians
subquestion: |
  Your child's guardian is the person a judge has appointed to care for and make decisions for your child.

  You can use this program if your child has a court-appointed guardian and you are a legal parent of your child. If your child has a short-term guardian, you do not need to use this program.

  The court will want to know why they should end the guardianship. You will need to explain why the guardianship started and why it is no longer needed.
---
id: whats next
continue button field: whats_next
question: |
  After you finish this program
subquestion: |
  Once you download your forms, you must file them with the court. This program **does not file** your forms for you. When you file your forms, you will get a date for a court hearing where a judge will review your case.

  After you file the *${ form_name }* and get a court date, you will need to give notice to the child's parents and close relatives. This ensures that everyone involved is aware of the case and has a chance to respond or appear in court.

  Finally, you will need to attend a court hearing where a judge will consider the reasons why ending the guardianship is in the child's best interest.
  
  **Note:** Filing forms, scheduling court dates, and giving notice are done differently depending on where you live. You may need to ask your local Circuit Clerk for details. To learn more, read the instructions you can download at the end of this program. 
---
id: child name
question: |
  What is the name of the child whose guardianship you want to end?
fields:
  - code: |
      child.name_fields()
---
id: user_qualified
question: |
  Are you ${child.name_full()}'s parent?
subquestion: |
  If you are ${child.name_full()}'s biological parent or legal adoptive parent, click **Yes**.
fields:
  - no label: user_qualified
    datatype: yesnoradio
---
id: ineligible kickout
event: ineligible_kickout
question: |
  Sorry
subquestion: |
  You must be a parent trying to regain guardianship of a child to use this program.

  Click **Back** if you made a mistake, or you can talk with a lawyer to discuss your options. Use **[Get Legal Help](https://www.illinoislegalaid.org/get-legal-help)** to find free or low-cost legal services in your area.
buttons:
  - Exit: exit
  - Restart: restart
---
id: child birthdate
question: |
  When was ${child.name_full()} born?
subquestion: |
  **Note:** If the child is undocumented and under 21, talk with an immigration lawyer to see if the child is eligible for **[Special Immigrant Juvenile Status](https://www.uscis.gov/working-in-US/eb4/SIJ)** before you file this form. Use **[Get Legal Help](https://www.illinoislegalaid.org/get-legal-help)** to find free or low-cost legal services in your area.
fields:
  - Birthdate: child.birthdate
    datatype: BirthDate
    alMax: ${ today().format("yyyy-MM-dd") }
---
id: child too old kick out
event: child_too_old
question: |
  Sorry
subquestion: |
  Based on your answers, ${child.name_full()} is no longer a minor child. The guardianship of a child automatically ends once the child turns 18 years old.

  This program cannot be used to end the guardianship of an adult. For more information about adult guardianships, check out ILAO's article about [**changing adult guardianship**](https://www.illinoislegalaid.org/node/97451).
  
  Click **Back** if you made a mistake, or you can talk with a lawyer to discuss your options. Use **[Get Legal Help](https://www.illinoislegalaid.org/get-legal-help)** to find free or low-cost legal services in your area.
buttons:
  - Exit: exit
  - Restart: restart
---
id: child address
question: |
  What is ${child.name_full()}'s current address?
subquestion: |
  **Note:** This address will appear on your forms.
fields:
  - Street address: child.address.address
    address autocomplete: True
  - Address line 2: child.address.unit
    required: False
  - City: child.address.city
  - State: child.address.state
    code: |
      states_list()
    default: IL
  - ZIP code: child.address.zip
---
id: child outside illinois kick out
event: child_outside_illinois
question: |
  Sorry
subquestion: |
  Based on your answers, ${child.name_full()} does not live in Illinois. This is a requirement for asking to discharge guardianship of a child in Illinois.

  If you want to file for discharge outside Illinois, you can use the [**Legal Services Corporation website**](https://www.lsc.gov/about-lsc/what-legal-aid/get-legal-help) to find a legal aid organization in another state.
buttons:
  - Exit: exit
  - Restart: restart
---
sets:
  - other_parties[0].name.first
id: current guardian name
question: |
  Who is the current legal guardian of ${child.name_full()}?
subquestion: |
  This is the person who you want to stop being ${child/name_full()}'s guardian.
fields:
  - code: |
      other_parties[0].name_fields()
---
code: |
  def get_address(person, child):
    if person.lives_with_child:
      person.address = child.address.copy_deep(person.attr_name('address'))
      person.address.known = True
    else:
      person.address.address
    return
---
id: guardian address
question: |
  What is ${other_parties[0].name_full()}'s current address?
fields:
  - Street address: other_parties[0].address.address
    address autocomplete: True
  - Address line 2: other_parties[0].address.unit
    required: False
  - City: other_parties[0].address.city
  - State: other_parties[0].address.state
    code: |
      states_list()
    default: IL
  - ZIP code: other_parties[0].address.zip
---
id: guardian lives with child
question: |
  Does ${other_parties[0].name_full()} live with ${child.name_full()}?
subquestion: |
  If ${other_parties[0].name_full()} lives at ${child.address.on_one_line(bare=True)}, click **Yes**.
fields:
  - no label: other_parties[0].lives_with_child
    datatype: yesnoradio
---
id: guardianship date
question: |
  When was ${other_parties[0].name_full()} appointed as guardian?
subquestion: |
  This date should be listed on the court order that appointed them.
fields:
  - Date: guardianship_date
    min: ${today().minus(years=18)}
    max: ${today()}
---
id: original county
question: |
  In which county is the court that appointed ${other_parties[0].name_full()} as guardian?
subquestion: |
  This may or may not be a different county than the one ${other_parties[0].name_full()} lives in
fields:
  - County: original_county_index
    datatype: integer
    code: |
      court_county_lookup()
---
depends on:
  - original_county_index
code: |
  if original_county_index == -1:
    original_court = court_list.as_court('original_court', 15)
    original_court .address.county = "Cook"
  else:
    original_court = court_list.as_court('original_court ', original_county_index)
---
id: why started
question: |
  Why was a guardianship of ${child.name_full()} set up?
subquestion: |
  Explain why ${other_parties[0].name_full()} was appointed as ${child.name_full()}'s guardian. For example, there may have been a period of time when you were not available to provide care.
fields:
  - When the guardian was appointed, the circumstances were: why_started
    input type: area
    maxlength: 500
    label above field: True
---
id: why end
question: |
  What has changed so that ${other_parties[0].name_full()} no longer needs to be ${child.name_full()}'s guardian?
subquestion: |
  Explain why ${other_parties[0].name_full()} does not need to be ${child.name_full()}'s guardian. For example, you or another family member may now be available to care for ${child.name_full()}.
fields:
  - The new circumstances are : why_end
    input type: area
    maxlength: 500
    label above field: True
---
id: other relatives
question: |
  About ${child.name_full()}'s other relatives
subquestion: |
  People closely related to ${child.name_full()} will need to be notified about the discharge. These people include:

  * ${child.name_full()}'s parents,
  * ${child.name_full()}'s adult siblings.
  * ${child.name_full()}'s spouse,
  * An adult who lives with and takes care of ${child.name_full()},
  * Anyone who has had custody of ${child.name_full()}, and
  * ${child.name_full()}'s "Guardian ad Litem," if one is assigned.

  You will need to list the names of anyone related to ${child.name_full()} in these ways.
fields:
  - Does ${child.name_full()} have other relatives who need to be notified?: other_relatives
    datatype: yesnoradio
---
sets:
  - other_parties[i].name.first
id: other parties name
question: |
  Who is the ${ordinal(i-1)} person related to ${child.name_full()} you need to notify?
subquestion: |
  ${collapse_template(list_reminder)}
fields:
  - code: |
      other_parties[i].name_fields()
---
template: list_reminder
subject: |
  **People who need to be notified**
content: |
  The following people need to be notified:
  
  * ${child.name_full()}'s parents,
  * ${child.name_full()}'s adult siblings.
  * ${child.name_full()}'s spouse,
  * Anyone who has had custody of ${child.name_full()}, and
  * ${child.name_full()}'s "Guardian ad Litem," if one is assigned.
---
id: there is another other parties
question: |
  Do you need to notify anyone else?
subquestion: |
  So far you told us about ${fix_punctuation(other_parties.full_names())}

  ${collapse_template(list_reminder)}
fields:
  - "Anyone else?": other_parties.there_is_another
    datatype: yesnoradio
---
id: other parties relationship
question: |
  How is ${other_parties[i].name_full()} related to ${child.name_full()}?
fields:
  - ${other_parties[i].name_full()} is:: other_parties[i].relationship
    input type: radio
    choices: 
      - "${child.name_full()}'s biological or adoptive **parent**": parent
      - "${ child.name_full()}'s **sibling** who is at least 18 years old": sibling
      - "Some **other adult** who has had **legal or physical custody** of ${ child.name_full()}": custody
      - "${child.name_full()}'s **spouse**": spouse
      - "${child.name_full()}'s **Guardian ad Litem**": gal
      - "A person with a **different relationship** to ${child.name_full()}": other
---
id: other parties live with
question: |
  Does ${other_parties[i].name_full()} live with ${child.name_full()}?
subquestion: |
  Earlier, you said ${child.name_full()} lives at ${child.address.on_one_line(bare=True)}. If ${other_parties[i].name_full()} also lives at that address, click **Yes**.
fields:
  - no label: other_parties[i].live_with
    datatype: yesnoradio
---
id: know other parties address
question: |
  Do you know ${other_parties[i].name_full()}'s address?
subquestion: |
  Their address may be listed on the guardianship order.
 
  If you do not know their current address but you do know their previous address, you can click **Yes** and enter that address.
fields:
  - no label: other_parties[0].address.known
    datatype: yesnoradio
---
id: other parties address
question: |
  What is ${other_parties[i].name_full()}'s address?
fields:
  - Street address: other_parties[i].address.address
    address autocomplete: True
  - Address line 2: other_parties[i].address.unit
    required: False
  - City: other_parties[i].address.city
  - State: other_parties[i].address.state
    code: |
      states_list()
    default: IL
  - ZIP code: other_parties[i].address.zip
    required: False
---
id: notice options for unknown address
generic object: ALIndividual
continue button field: x.notice_options
question: |
  Notifying ${x.name_full()}
subquestion: |  
  You should try and find ${x.name_full()}'s address or another way to give them notice. If you know their email address, you can give them notice by email.

  If you cannot find a way to give ${x.name_full()} notice, the court may want you to publish notice of the discharge case in a newspaper. You may want to discuss this with a lawyer. Use **[Get Legal Help](https://www.illinoislegalaid.org/get-legal-help)** to find free or low-cost legal services in your area.
---
id: knows delivery method
generic object: ALIndividual
question: |
  Do you know **how** and **when** you will send your forms to ${ x.name_full() }?
subquestion: |
  ${ collapse_template(delivery_method_help) }  

  You must deliver the *Petition to Discharge Guardianship of a Minor* and the *Notice of Hearing* at least **7 days** before the court date. You must deliver paper copies of your forms. You cannot use email. 

  If you do not know this now, you can add it to the Proof of Delivery section of your forms later.
fields:
  - no label: x.knows_delivery_method
    datatype: radio
    choices:
      - Yes: True
      - No. I do not know this now. I will add it to my forms later.: False
---
template: delivery_method_help
subject: |
  **What are my delivery options?**
content: |  
  You can deliver the forms by:
  
  * Personal hand delivery, or
  * US mail or a delivery company (like UPS or FedEx), with postage or delivery prepaid.

  If you are in a prison or jail, you can deliver by mail.
---
id: all party delivery method
generic object: ALIndividual
question: |
  How will you send your forms to ${ x.name_full() }?
subquestion: |
  You must deliver your forms by hand, by mail, through a delivery company. You cannot use email.
  
  If you do not know this now, be sure to add it to the Proof of Delivery section of your forms later.
fields:
  - "I will personally **hand-deliver** the forms. **Note:** You can only deliver to the person or to their family member who is age 13 or older at their home.": x.hand_delivery
    datatype: yesnowide
    required: False
  - I will send the forms by **US mail or a delivery company** (like UPS or FedEx).: x.mail_delivery
    datatype: yesnowide
    required: False
  - Street address or intersection of mailbox or delivery company: x.delivery_mail_address
    maxlength: 40
    js show if: 
      val("x.mail_delivery") == true
    required: False
  - City of mailbox or delivery company: x.delivery_mail_city
    maxlength: 30
    js show if: 
      val("x.mail_delivery") == true
    required: False
  - State of mailbox or delivery company: x.delivery_mail_state
    code: |
      states_list()
    js show if: 
      val("x.mail_delivery") == true
    required: False
  - I will send the forms by mail from a **prison or jail**.: x.jail_delivery
    datatype: yesnowide
    required: False
  - note: |
      Enter prison or jail information
    js show if: 
      val("x.jail_delivery") == true
  - Name of prison or jail: x.delivery_jail_name
    maxlength: 40
    js show if: 
      val("x.jail_delivery") == true
    required: False
  - Street address: x.jail_delivery_address.address
    address autocomplete: True
    js show if: 
      val("x.jail_delivery") == true
    required: False
  - Address line 2: x.jail_delivery_address.unit
    js show if: 
      val("x.jail_delivery") == true
    required: False
  - City: x.jail_delivery_address.city
    js show if: 
      val("x.jail_delivery") == true
    required: False
  - State: x.jail_delivery_address.state
    code: |
      states_list()
    js show if: 
      val("x.jail_delivery") == true
    required: False
  - ZIP code: x.jail_delivery_address.zip
    js show if: 
      val("x.jail_delivery") == true
    required: False
---
id: delivery time
generic object: ALIndividual
question: |
  When will you send your forms to ${ x.name_full() }?
subquestion: |
  **Remember:** You must send the *Petition for Guardianship of a Minor* and the *Notice of Hearing* at least **7 days** before the court date.

  If you do not know this now, be sure to add it to your forms later.
fields:
  - Date: x.delivery_date
    datatype: date
    required: False
    min: ${ today() }
    max: ${ today().plus(years=1) }
  - Time: x.delivery_time
    datatype: time
    required: False
validation code: |
  if (not showifdef('x.delivery_date')):
    x.knows_delivery_date = False
  else:
    x.knows_delivery_date = True
  if (not showifdef('x.delivery_time')):
    x.knows_delivery_time = False
  else:
    x.knows_delivery_time = True
---
id: others agreement
continue button field: others_agree
question: |
  % if other_parties.number_gathered == 1:
  About ${other_parties[0].name_full()}
  % else:
  About ${other_parties[0].name_full()} and the others
  % endif
subquestion: |
  If ${other_parties[i].full_names(and_string=word("or"))} do not want the guardianship to be discharged, they may appear in court to tell the judge why.

  If you think any of ${child.name_full()}'s relatives will disagree with the discharge, you may want a lawyer to help you. Use **[Get Legal Help](https://www.illinoislegalaid.org/get-legal-help)** to find free or low-cost legal services in your area.
