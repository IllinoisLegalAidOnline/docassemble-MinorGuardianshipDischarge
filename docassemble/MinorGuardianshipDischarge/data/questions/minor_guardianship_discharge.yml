reconsider: True
code: |
  temp_list = []
  if other_parties.number_gathered() > 1:
    for index, party in enumerate(other_parties):
      if index == 0:
        if party.lives_with_child:
          temp_list.append(party)
      else:
        if party.lives_with_child:
          temp_list.append(party)
  elif other_parties[0].lives_with_child:
    temp_list.append(other_parties[0])
  live_with_parties = ALPeopleList("live_with_parties", elements = temp_list)
