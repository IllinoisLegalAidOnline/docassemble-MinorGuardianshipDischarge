  - Address line 2: other_parties[0].address.unit
    required: False
  - City: other_parties[0].address.city
  - State: other_parties[0].address.state
    code: |
      states_list()
    default: IL
  - ZIP code: other_parties[0].address.zip
---
id: guardianship date
question: |
  When was ${other_parties[0].name_full()} appointed as guardian?
subquestion: |
  This date should be listed on the court order that appointed them.
fields:
