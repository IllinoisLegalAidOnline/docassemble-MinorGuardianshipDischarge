      - "user__2": ${ users[0].name_full() }
      - "user_mail_address_one_line__1": ${ users[0].address.on_one_line(bare=True) }
      - "user_phone_number__1": ${ phone_number_formatted(users[0].phone_number) }
      - "user_email": ${ users[0].email if users[0].has_email_address else '' }
      - "case_number__1": ${ case_number }
      - "case_number__2": ${ case_number }   
      - "e_sign_name__1": ${ users[0].name_full() if e_signature else '' }
      - "for_self": ${True}
      - "document_name": ${"Petition to Discharge Guardianship of a Minor, Notice of Court Date for Motion"}
      - "delivery_party1_name_full": | 
          ${ x.name_full() }
      - "delivery_party1_mail_address_on_one_line": ${ x.address.on_one_line(bare=True) if x.address_known and x.knows_delivery_method else "" }
      - "delivery_party1_email": ${ x.delivery_email if x.address_known and x.knows_delivery_method else '' }
      - "delivery_party1_email_efsp": ${ x.delivery_efsp_email if x.address_known and x.knows_delivery_method else '' }
      - "is_delivery_party1_hand_yes": ${ x.hand_delivery if x.address_known and x.knows_delivery_method else '' }
      - "is_delivery_party1_mail_yes": ${ x.mail_delivery if x.address_known and x.knows_delivery_method else '' }
      - "is_delivery_party1_efm_yes": ${ x.efm_delivery if x.address_known and x.knows_delivery_method else '' }
      - "is_delivery_party1_email_yes": ${ x.email_delivery if x.address_known and x.knows_delivery_method else '' }
      - "delivery_party1_date": ${ x.delivery_date if x.address_known and x.knows_delivery_method and x.knows_delivery_date else '' }
      - "delivery_party1_time": ${ format_time(x.delivery_time, format='h:mm a') if x.address_known and x.knows_delivery_method and x.knows_delivery_time else '' }
      
      - "is_delivery_party1_not_electronic": ${ True if x.address_known and x.knows_delivery_method else '' }
      - "delivery_party1_mail_location": |
          % if x.address_known:
          % if x.knows_delivery_method and x.mail_delivery:
          % if x.delivery_mail_address != "" and x.delivery_mail_city != "" and x.delivery_mail_state != "":
          ${x.delivery_mail_address }, ${x.delivery_mail_city}, ${ state_name(x.delivery_mail_state) }
          % elif x.delivery_mail_address != "" and x.delivery_mail_city != "":
          ${x.delivery_mail_address }, ${x.delivery_mail_city}
          % elif x.delivery_mail_address != "" and x.delivery_mail_state != "":
          ${x.delivery_mail_address }, ${ state_name(x.delivery_mail_state) }
          % elif x.delivery_mail_city != "" and x.delivery_mail_state != "":
          ${x.delivery_mail_city}, ${ state_name(x.delivery_mail_state) }
          % elif x.delivery_mail_address != "":
          ${x.delivery_mail_address}
          % elif x.delivery_mail_city != "":
          ${x.delivery_mail_city}
          % else:
          ${state_name(x.delivery_mail_state)}
          % endif
          % else:
          ${ "" }
          % endif
          % else:
          ${ "" }
          % endif
      - "is_delivery_party1_jail_yes": ${ True if x.address_known and x.knows_delivery_method and x.jail_delivery else '' }
      - "delivery_party1_jail_name": |
          % if x.address_known and x.knows_delivery_method and x.jail_delivery:
          % if x.delivery_jail_name != "" and x.jail_delivery_address.address != "" and x.jail_delivery_address.city != "" and x.jail_delivery_address.state != "":
          ${ x.delivery_jail_name }, ${ x.jail_delivery_address.on_one_line(bare=True)}
          % elif x.delivery_jail_name == "":
          ${ x.jail_delivery_address.on_one_line(bare=True)}
          % else:
          ${ x.delivery_jail_name }
          % endif
          % else:
          ${""}
          % endif 
