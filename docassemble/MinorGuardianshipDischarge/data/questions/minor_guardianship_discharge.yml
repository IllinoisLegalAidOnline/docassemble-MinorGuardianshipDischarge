  - other_parties: ALPeopleList.using(there_are_any=True, complete_attribute='complete')
  - other_parties[i].jail_delivery_address: ALAddress
  - child: ALIndividual
---
code: |
  al_form_type = 'starts_case'
  ilao_easy_form_title = "End guardianship of a child"
  ilao_easy_form_url = "https://www.illinoislegalaid.org/legal-information/minor-guardianship-discharge"
  form_name = "Petition to Discharge Guardianship of a Minor"
  github_user = 'IllinoisLegalAidOnline'
  github_repo_name = 'docassemble-MinorGuardianshipDischarge'
  allowed_courts = ['Circuit']
---
sections:
  - section_intro: Start
  - section_child: Child
  - section_guardian: Guardian
  - section_family: Child's parents, caregivers, and relatives
  - section_user: About you
  - section_filing: Court and filing details
  - section_download: Download
---
# interview order block
mandatory: True
code: |
  nav.set_section('section_intro')
  sees_nav_bar
  snapshot_start
  how_to_use
  set_progress(5)
  basic_info
  accept_terms
  whats_next

  nav.set_section('section_child')
  child.name.first
  if not user_qualified:
    ineligible_kickout
  if child.age_in_years() >= 18:
    child_too_old
  if child.address.state != 'IL':
    child_outside_illinois

  nav.set_section('section_guardian')
  other_parties[0].name.first
  get_address(other_parties[0], child)
  guardianship_date
  if not court_in_il:
    court_not_il_kickout
  case_number
  why_started
  why_end
  about_notice
  if other_parties[0].knows_delivery_method:
    other_parties[0].hand_delivery
    other_parties[0].delivery_date

  nav.set_section('section_family')
  other_parties.gather()
  others_agree

  nav.set_section('section_user')
  users[0].name.first
  users[0].address.address
  users[0].has_email_address
  #users[0].housing

  nav.set_section('section_filing')
  if trial_court_index == -1:
    cook_district
  if has_court_date:
    hearing_date
    hearing_type
  e_signature
  set_progress(100)
  nav.set_section('section_download')
  forms_assembling
  build_lives_with_list
  refresh_delivery_bundle
  get_docs_screen
---
#other parties gather loop
code: |
  other_parties[i].name.first
  if i != 0:
    other_parties[i].relationship
    get_address(other_parties[i], child)
    if other_parties[i].address_known:
      other_parties[i].address.address
      if other_parties[i].knows_delivery_method:
        other_parties[i].hand_delivery
        other_parties[i].delivery_date
    else:
      other_parties[i].notice_by_publication  
  #else:
  #  other_parties.there_is_another = True
  other_parties[i].complete = True
