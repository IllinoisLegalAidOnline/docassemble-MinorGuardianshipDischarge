#Flagged for SME: The Guardianship of a child Easy Form has a specific template in its form suite for notice by publication, but there is not one for discharge. Cook County does have [**a form for this purpose**](https://services.cookcountyclerkofcourt.org/forms/Forms/pdf_files/CCJP0680.pdf), though. I will ask a SME or LCM what the legal requirements are and how we should handle it in this Easy Form.
id: notice options for unknown address
generic object: ALIndividual
question: |
  Notice by publication
subquestion: |  
  If you cannot find ${x.name_full()}'s address to notify them in person or by mail, you will have to give them notice of the guardianship by publishing in a newspaper.

  How you ask a newspaper to publish notice of the guardianship varies. In some counties, the Circuit Clerk will send the case information to the newspaper. You can visit [**Illinois Court Help**](https://www.ilcourthelp.gov/) to ask about the process in your county, or you can call or text (833) 411-1121 for assistance.

  This program will make a *Proof of Delivery* form for ${x.name_full()}. If you find out what their address is later, you can add their address to the form.
continue button field: x.notice_by_publication
