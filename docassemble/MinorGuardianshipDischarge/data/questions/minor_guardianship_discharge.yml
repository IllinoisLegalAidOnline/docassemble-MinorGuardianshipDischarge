id: about notice
continue button field: about_notice
question: |
  Giving notice
subquestion: |
  You will need to give notice to ${other_parties[0].name_full()} and ${child.name_full()}'s **{close relatives}** that you are asking the court to end the guardianship. This ensures that everyone involved is aware of the case and has a chance to respond or appear in court.

  To give them notice, you will have to give them copies of your petition and a *Notice of Court Date* form. Notice is done differently depending on where you file. Usually you can deliver the forms by hand or send them by certified mail.

  The next screens will ask questions that will help you figure out who needs to be informed and how you can give them notice. At the end of this program, you can download the required forms and instructions to guide you through the next steps.
terms:
  - close relatives: |
      This includes:
      
      * The child's parents,
      * The child's adult siblings.
      * The child's spouse,
      * Any adult who lives with and takes care of the child,
      * Anyone who has had custody of the child, and
      * The child's "Guardian ad Litem," if one is assigned.
---
id: notice options for unknown address
generic object: ALIndividual
continue button field: x.notice_options
question: |
  Notifying ${x.name_full()}
subquestion: |  
  You should try and find ${x.name_full()}'s address or another way to give them notice. If you know their email address, you can give them notice by email.

  If you cannot find a way to give ${x.name_full()} notice, the court may want you to publish notice of the case in a newspaper. You may want to discuss this with a lawyer. Use **[Get Legal Help](https://www.illinoislegalaid.org/get-legal-help)** to find free or low-cost legal services in your area.
---
id: knows delivery method
generic object: ALIndividual
question: |
  Do you know **how** and **when** you will send your forms to ${ x.name_full() }?
subquestion: |
  ${ collapse_template(delivery_method_help) }  

  You must deliver the *${form_name}* and the *Notice of Court Date* at least **7 days** before the court date. You must deliver paper copies of your forms. You cannot use email. 

  If you do not know this now, you can add it to the Proof of Delivery section of your forms later.
fields:
  - no label: x.knows_delivery_method
    datatype: radio
    choices:
      - Yes: True
      - No. I do not know this now. I will add it to my forms later.: False
---
template: delivery_method_help
subject: |
  **What are my delivery options?**
content: |  
  You can deliver the forms by:
  
  * Personal hand delivery, or
  * US mail or a delivery company (like UPS or FedEx), with postage or delivery prepaid.

  If you are in a prison or jail, you can deliver by mail.
---
id: all party delivery method
generic object: ALIndividual
question: |
  How will you send your forms to ${ x.name_full() }?
subquestion: |
  You must deliver your forms by hand, by mail, or through a delivery company. You cannot use email. (**Flagged for SME**. We should confirm that this is the case, and how the program should handle using the AOIC proof of delivery forms that have the email & efiling fields.)
  
  If you do not know this now, be sure to add it to the Proof of Delivery section of your forms later.
fields:
  - "I will personally **hand-deliver** the forms. **Note:** You can only deliver to the person or to their family member who is age 13 or older at their home.": x.hand_delivery
    datatype: yesnowide
    required: False
  - I will send the forms by **US mail or a delivery company** (like UPS or FedEx).: x.mail_delivery
    datatype: yesnowide
    required: False
  - Street address or intersection of mailbox or delivery company: x.delivery_mail_address
    maxlength: 40
    js show if: 
      val("x.mail_delivery") == true
    required: False
  - City of mailbox or delivery company: x.delivery_mail_city
